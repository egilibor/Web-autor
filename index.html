<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emilio Gil Ibor | Narrativa</title>

<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<style>

/* =============================
RESET Y VARIABLES
============================= */

:root {
--color-ink:#0f172a;
--color-paper:#f8fafc;
--color-text:#334155;

--color-violin:#d4af37;
--color-cristal:#991b1b;
--color-alfarero:#1a202c;
--color-polvora:#ea580c;
--color-huella:#475569;

--color-accent:#2563eb;

--font-serif:'Playfair Display', serif;
--font-sans:'Lato', sans-serif;
}

html{scroll-behavior:smooth}
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:var(--font-sans);
background:var(--color-paper);
color:var(--color-ink);
line-height:1.6
}

.container{max-width:1200px;margin:0 auto;padding:0 20px}

a{text-decoration:none;color:inherit;transition:.3s}

/* =============================
BOTONES
============================= */

.btn{
display:inline-block;
padding:12px 25px;
font-weight:bold;
text-transform:uppercase;
letter-spacing:1px;
font-size:.85rem;
cursor:pointer;
transition:.3s;
text-align:center;
border-width:2px;
border-style:solid;
background:transparent
}

.btn-gold{border-color:var(--color-violin);color:#854d0e}
.btn-gold:hover{background:var(--color-violin);color:white}

.btn-red{border-color:var(--color-cristal);color:var(--color-cristal)}
.btn-red:hover{background:var(--color-cristal);color:white}

.btn-dark{border-color:var(--color-alfarero);color:var(--color-alfarero)}
.btn-dark:hover{background:var(--color-alfarero);color:white}

.btn-orange{border-color:var(--color-polvora);color:var(--color-polvora)}
.btn-orange:hover{background:var(--color-polvora);color:white}

.btn-blue{border-color:var(--color-huella);color:var(--color-huella)}
.btn-blue:hover{background:var(--color-huella);color:white}

.btn-hero{
background:var(--color-polvora);
color:white;
border-color:var(--color-polvora);
padding:15px 35px
}

.btn-hero:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,.2)
}

/* =============================
NAVBAR
============================= */

nav{
position:fixed;
top:0;
width:100%;
background:rgba(255,255,255,.98);
border-bottom:2px solid var(--color-ink);
z-index:1000;
height:100px;
display:flex;
align-items:center
}

nav .container{
display:flex;
justify-content:space-between;
align-items:center;
width:100%
}

.logo{
font-family:var(--font-serif);
font-size:2.2rem;
font-weight:700;
letter-spacing:-1.5px
}

.menu{
display:flex;
gap:35px;
font-size:.85rem;
text-transform:uppercase;
letter-spacing:2px;
color:#64748b
}

@media(max-width:768px){

nav{height:80px}
.logo{font-size:1.6rem}
.menu{display:none}

}

/* =============================
HERO
============================= */

.hero{
padding:160px 0 100px;
min-height:85vh;
display:flex;
align-items:center;
background:linear-gradient(to right,#fff 55%,#f1f5f9 55%)
}

.hero-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:60px;
align-items:center
}

.hero-content h1{
font-family:var(--font-serif);
font-size:3.5rem;
margin-bottom:20px
}

.hero-image img{
width:100%;
max-width:380px;
display:block;
margin:auto;
border-radius:4px;
box-shadow:20px 20px 0 rgba(0,0,0,.05)
}

/* =============================
LIBROS
============================= */

.books-section{
padding:100px 0;
background:white;
scroll-margin-top:80px
}

.section-header{
margin-bottom:60px;
border-left:5px solid var(--color-ink);
padding-left:20px
}

.section-header h2{
font-family:var(--font-serif);
font-size:2.5rem
}

.books-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:40px
}

.book-card{
background:white;
border:1px solid #f1f5f9;
display:flex;
flex-direction:column;
transition:.3s
}

.book-card:hover{
box-shadow:0 20px 40px rgba(0,0,0,.08);
transform:translateY(-5px)
}

.book-cover{
height:500px;
background:#e2e8f0;
position:relative;
overflow:hidden
}

.book-cover img{
width:100%;
height:100%;
object-fit:cover
}

.book-content{
padding:30px;
flex-grow:1;
display:flex;
flex-direction:column
}

.book-tag{
font-size:.75rem;
font-weight:bold;
text-transform:uppercase;
letter-spacing:1px;
margin-bottom:10px
}

.book-title{
font-family:var(--font-serif);
font-size:1.8rem;
margin-bottom:15px
}

.book-description{
color:#64748b;
font-size:.95rem;
margin-bottom:25px;
flex-grow:1
}

/* =============================
BIO
============================= */

.bio-section{
padding:100px 0;
background:#f8fafc;
scroll-margin-top:80px
}

.bio-grid{
display:grid;
grid-template-columns:1fr 2fr;
gap:50px;
align-items:center
}

.bio-image img{
width:100%;
border-radius:4px;
box-shadow:0 10px 20px rgba(0,0,0,.1)
}

.bio-content h3{
font-family:var(--font-serif);
font-size:2rem;
margin-bottom:20px
}

/* =============================
CONTACTO
============================= */

.newsletter{
background:var(--color-ink);
color:white;
padding:80px 0;
text-align:center
}

.form-input{
padding:15px 20px;
width:300px;
border:none;
background:#1e293b;
color:white
}

</style>
</head>

<body>

<!-- NAV -->

<nav>
<div class="container">
<div class="logo">Emilio Gil Ibor</div>

<div class="menu">
<a href="#obras">Novelas</a>
<a href="#biografia">El Autor</a>
<a href="blog.html">Blog</a>
<a href="#contacto" style="font-weight:bold;color:var(--color-ink)">Contacto</a>
</div>
</div>
</nav>

<!-- HERO -->

<header class="hero">

<div class="container">

<div class="hero-grid">

<div class="hero-content">

<span style="color:var(--color-polvora);text-transform:uppercase;letter-spacing:3px;font-weight:bold;font-size:.9rem">Explora el universo de</span>

<h1>Emilio Gil Ibor</h1>

<p style="font-size:1.2rem;color:var(--color-text);margin-bottom:35px">
Desde el noir valenciano de la Saga Escrihuela hasta el realismo crudo de la España rural.
</p>

<div style="display:flex;gap:15px">

<a href="#obras" class="btn btn-hero">Ver Bibliografía</a>

<a href="autor.html" class="btn" style="border:2px solid var(--color-ink)">El Autor</a>

</div>

</div>

<div class="hero-carousel" style="position:relative;height:500px;display:flex;align-items:center;justify-content:center">

<img src="violin-roto.jpg" class="slide" loading="lazy" style="position:absolute;max-width:350px;opacity:1;border-radius:4px;box-shadow:20px 20px 60px rgba(0,0,0,.15)">

<img src="seres-de-cristal.jpg" class="slide" loading="lazy" style="position:absolute;max-width:350px;opacity:0;border-radius:4px;box-shadow:20px 20px 60px rgba(0,0,0,.15)">

</div>

</div>

</div>

</header>

<!-- LIBRO VIDEO -->

<div style="margin-top:30px;text-align:center">

<h4 style="font-family:var(--font-serif);margin-bottom:15px">Video</h4>

<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:8px">

<iframe
style="position:absolute;top:0;left:0;width:100%;height:100%;border:0"
src="https://www.youtube.com/embed/6VZS6kZKtBE"
title="Presentación Musical"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen>
</iframe>

</div>

</div>

<!-- FOOTER -->

<footer style="background:#0f172a;color:white;padding:40px 0;text-align:center;font-size:.9rem">

<div class="container">

<p style="opacity:.6">© 2026 Emilio Gil Ibor - Escritor</p>

<p style="margin-top:10px;font-style:italic;opacity:.4">"El violín no hablaba, pero lo había visto todo."</p>

</div>

</footer>

<script>

(function(){

let current=0

const slides=document.querySelectorAll('.slide')

if(slides.length>0){

setInterval(()=>{

slides[current].style.opacity=0

current=(current+1)%slides.length

slides[current].style.opacity=1

},5000)

}

})();

</script>

</body>
</html>
